<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting | Giovany Kantoro</title>
    <script>
      var basePath = '/portfolio';
      var path = window.location.pathname.startsWith(basePath + '/')
        ? window.location.pathname.slice(basePath.length)
        : window.location.pathname;
      sessionStorage.setItem('portfolioRedirect', path + window.location.search + window.location.hash);
      window.location.replace(basePath + '/');
    </script>
  </head>
  <body>
    <a href="/portfolio/">Return home</a>
  </body>
</html>
